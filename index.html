<!DOCTYPE html>
<html>
<head>
    <title>Achievo - Daily Growth Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Chart.js CDN -->
   <script>
    let today = new Date().toLocaleDateString();
    let data = JSON.parse(localStorage.getItem("achievoData")) || {};
    let streak = parseInt(localStorage.getItem("streak")) || 0;
    let lastCompletedDate = localStorage.getItem("lastCompletedDate") || "";

    if (!data[today]) {
        data[today] = [];
    }

    function saveData() {
        localStorage.setItem("achievoData", JSON.stringify(data));
        localStorage.setItem("streak", streak);
        localStorage.setItem("lastCompletedDate", lastCompletedDate);
    }

    function addTask() {
        let input = document.getElementById("taskInput");
        let text = input.value.trim();
        if (text === "") return;

        data[today].push({ text: text, done: false });
        input.value = "";
        saveData();
        renderTasks();
    }

    function toggleTask(index) {
        data[today][index].done = !data[today][index].done;
        saveData();
        renderTasks();
    }

    function deleteTask(index) {
        data[today].splice(index, 1);
        saveData();
        renderTasks();
    }

    function updateStats() {
        let total = data[today].length;
        let completed = data[today].filter(t => t.done).length;
        let rate = total === 0 ? 0 : ((completed / total) * 100).toFixed(2);

        document.getElementById("totalTasks").innerText = total;
        document.getElementById("completedTasks").innerText = completed;
        document.getElementById("successRate").innerText = rate + "%";

        checkStreak(total, completed);
    }

    function checkStreak(total, completed) {
        if (total > 0 && completed === total) {
            if (lastCompletedDate !== today) {
                streak++;
                lastCompletedDate = today;
            }
        }

        document.getElementById("streakCount").innerText = streak;
        saveData();
    }

    function renderTasks() {
        let list = document.getElementById("taskList");
        list.innerHTML = "";

        data[today].forEach((task, index) => {
            let li = document.createElement("li");

            li.innerHTML = `
                <span class="${task.done ? 'completed' : ''}">
                    ${task.text}
                </span>
                <div>
                    <button onclick="toggleTask(${index})">
                        ${task.done ? "Undo" : "Done"}
                    </button>
                    <button onclick="deleteTask(${index})">
                        Delete
                    </button>
                </div>
            `;

            list.appendChild(li);
        });

        updateStats();
    }

    renderTasks();
</script>

</body>
</html>
